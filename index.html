<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Coding: Game Snake</title>
	<link rel="manifest" href="manifest.json">
	<meta name="theme-color" content="#89dceb">
    <style>
        body {
            background-color: #1e1e2e;
            color: #cdd6f4;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: none; /* KODE BARU: Mengunci layar */
        }
        h1 {
            margin-bottom: 10px;
        }
        #score-board {
            font-size: 24px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        
        /* Container untuk canvas dan menu agar posisinya pas */
        #game-container {
            position: relative;
        }

        canvas {
            background-color: #313244;
            border: 4px solid #89dceb;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Desain Menu */
        #menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(30, 30, 46, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            z-index: 10;
            backdrop-filter: blur(3px);
        }

        #menu h2 {
            font-size: 32px;
            margin: 0 0 10px 0;
            color: #f38ba8;
        }

        #menu-score {
            font-size: 20px;
            margin-bottom: 30px;
            color: #a6e3a1;
        }

        button {
            padding: 12px 30px;
            font-size: 20px;
            font-weight: bold;
            color: #1e1e2e;
            background-color: #89dceb;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background-color: #74c7d6;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <h1>Game Snake 🐍</h1>
    <div id="score-board">Skor: <span id="score">0</span></div>
    
    <div id="game-container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        
        <!-- Layar Menu -->
        <div id="menu">
            <h2 id="menu-title">Siap Bermain?</h2>
            <p id="menu-score">Kendalikan ular dengan panah keyboard</p>
            <button id="start-btn">Mulai Game</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        
        // Elemen Menu
        const menu = document.getElementById("menu");
        const menuTitle = document.getElementById("menu-title");
        const menuScore = document.getElementById("menu-score");
        const startBtn = document.getElementById("start-btn");

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [{ x: 10, y: 10 }];
        let food = { x: 5, y: 5 };
        let dx = 1;
        let dy = 0;
        let score = 0;
        let gameInterval;
        let gameSpeed = 120; // Sedikit lebih lambat agar nyaman

        // Tombol Start diklik
        startBtn.addEventListener("click", () => {
            menu.style.display = "none"; // Sembunyikan menu
            resetGame();
        });

        function main() {
            if (hasGameEnded()) {
                clearInterval(gameInterval);
                showGameOver();
                return;
            }

            clearCanvas();
            drawFood();
            moveSnake();
            drawSnake();
        }

        function clearCanvas() {
            ctx.fillStyle = "#313244";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                // Tentukan titik tengah untuk menggambar bentuk bulat
                const centerX = part.x * gridSize + gridSize / 2;
                const centerY = part.y * gridSize + gridSize / 2;
                const radius = (gridSize / 2) - 2;

                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                
                if (index === 0) {
                    // Warna Kepala Ular
                    ctx.fillStyle = "#89dceb"; 
                    ctx.fill();

                    // Gambar Mata Ular
                    ctx.fillStyle = "#1e1e2e";
                    let eyeOffset1 = {x: 0, y: 0}, eyeOffset2 = {x: 0, y: 0};
                    
                    // Posisi mata menyesuaikan arah (dx, dy)
                    if (dx === 1) { eyeOffset1 = {x: 4, y: -4}; eyeOffset2 = {x: 4, y: 4}; }      // Kanan
                    else if (dx === -1) { eyeOffset1 = {x: -4, y: -4}; eyeOffset2 = {x: -4, y: 4}; } // Kiri
                    else if (dy === 1) { eyeOffset1 = {x: -4, y: 4}; eyeOffset2 = {x: 4, y: 4}; }    // Bawah
                    else if (dy === -1) { eyeOffset1 = {x: -4, y: -4}; eyeOffset2 = {x: 4, y: -4}; } // Atas

                    ctx.beginPath();
                    ctx.arc(centerX + eyeOffset1.x, centerY + eyeOffset1.y, 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(centerX + eyeOffset2.x, centerY + eyeOffset2.y, 2, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    // Warna Badan Ular
                    ctx.fillStyle = "#a6e3a1";
                    ctx.fill();
                }
            });
        }

        function moveSnake() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.innerText = score;
                generateFood();
            } else {
                snake.pop();
            }
        }

        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
            
            snake.forEach(part => {
                if (part.x === food.x && part.y === food.y) {
                    generateFood();
                }
            });
        }

        function drawFood() {
            const centerX = food.x * gridSize + gridSize / 2;
            const centerY = food.y * gridSize + gridSize / 2;
            
            ctx.fillStyle = "#f38ba8";
            ctx.beginPath();
            ctx.arc(centerX, centerY, (gridSize / 2) - 2, 0, Math.PI * 2);
            ctx.fill();
        }

        function hasGameEnded() {
            if (snake[0].x < 0 || snake[0].x >= tileCount || snake[0].y < 0 || snake[0].y >= tileCount) {
                return true;
            }
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            return false;
        }

        function resetGame() {
            snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }]; // Ular mulai dengan panjang 3
            dx = 1;
            dy = 0;
            score = 0;
            scoreElement.innerText = score;
            generateFood();
            
            clearInterval(gameInterval);
            gameInterval = setInterval(main, gameSpeed);
        }

        function showGameOver() {
            menuTitle.innerText = "Game Over!";
            menuTitle.style.color = "#f38ba8";
            menuScore.innerText = "Skor Akhir Kamu: " + score;
            startBtn.innerText = "Main Lagi";
            menu.style.display = "flex"; // Tampilkan menu lagi
        }

        // Kontrol Keyboard (Mencegah ular mundur menabrak badannya sendiri)
     // Kontrol Keyboard (Mencegah ular mundur menabrak badannya sendiri)
        window.addEventListener("keydown", e => {
            switch (e.key) {
                case "ArrowUp":
                    if (dy === 0) { dx = 0; dy = -1; }
                    break;
                case "ArrowDown":
                    if (dy === 0) { dx = 0; dy = 1; }
                    break;
                case "ArrowLeft":
                    if (dx === 0) { dx = -1; dy = 0; }
                    break;
                case "ArrowRight":
                    if (dx === 0) { dx = 1; dy = 0; }
                    break;
            }
        });


      // Kontrol Layar Sentuh (Swipe untuk HP)
        let touchStartX = 0;
        let touchStartY = 0;
        let touchEndX = 0;
        let touchEndY = 0;

        window.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        });

        // KODE BARU: Mencegah layar ikut bergerak/scroll saat diusap
        window.addEventListener('touchmove', e => {
            e.preventDefault();
        }, { passive: false });

        window.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            touchEndY = e.changedTouches[0].screenY;
            handleSwipe();
        });


        function handleSwipe() {
            let xDiff = touchEndX - touchStartX;
            let yDiff = touchEndY - touchStartY;

            // Memastikan swipe cukup panjang (bukan sekadar ter-klik)
            if (Math.abs(xDiff) > 30 || Math.abs(yDiff) > 30) {
                if (Math.abs(xDiff) > Math.abs(yDiff)) {
                    // Mendeteksi usapan Kiri atau Kanan
                    if (xDiff > 0 && dx === 0) { dx = 1; dy = 0; } // Kanan
                    else if (xDiff < 0 && dx === 0) { dx = -1; dy = 0; } // Kiri
                } else {
                    // Mendeteksi usapan Atas atau Bawah
                    if (yDiff > 0 && dy === 0) { dx = 0; dy = 1; } // Bawah
                    else if (yDiff < 0 && dy === 0) { dx = 0; dy = -1; } // Atas
                }
            }
        }

        // Gambar latar belakang awal sebelum game dimulai
        clearCanvas();
    </script>
